services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: dbname
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql  # 👈 runs on first start
    ports:
      - "5432:5432"

  airflow:
    build: .
    depends_on:
      - postgres
    environment:
      AIRFLOW_CONN_POSTGRES_DEFAULT: 'postgresql://admin:admin@postgres:5432/dbname'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: 'postgresql+psycopg2://admin:admin@postgres:5432/dbname'
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/root/airflow/dags

volumes:
  postgres_data: